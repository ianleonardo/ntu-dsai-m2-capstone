# CORRECTED Dagster Configuration Examples for SEC Data Pipeline

# ================================================
# FOR INDIVIDUAL ASSETS (Assets Tab)
# ================================================

# Example 1: Single Quarter Asset Materialization
single_quarter_asset:
  year: 2023
  quarters: ["q1"]

# Example 2: Full Year Asset Materialization  
full_year_asset:
  year: 2023
  quarters: ["q1", "q2", "q3", "q4"]

# ================================================
# FOR COMPLETE JOBS (Jobs Tab) 
# ================================================

# Example 3: Single Quarter Job Execution
single_quarter_job:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1"]

# Example 4: Full Year Job Execution
full_year_job:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1", "q2", "q3", "q4"]

# Example 5: Complete Pipeline Job (Download -> GCS -> BigQuery)
complete_pipeline_job:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1"]
    sec_gcs_data:
      config:
        bucket_name: "dsai-m2-bucket"
        keep_local: false
    meltano_staging_data:
      config:
        year: 2023
        quarters: ["q1"]
    bigquery_sec_data:
      config:
        year: 2023
        quarters: ["q1"]
    sec_pipeline_summary:
      config:
        year: 2023
        quarters: ["q1"]

# ================================================
# CLI USAGE EXAMPLES
# ================================================

# Materialize single asset:
# uv run --with dagster dagster asset materialize --asset sec_raw_data --config '{"year": 2023, "quarters": ["q1"]}'

# Run complete job:
# uv run --with dagster dagster job execute --job sec_pipeline_job --config-file dagster_config_fixed.yaml:single_quarter_job'

# Run complete pipeline:
# uv run --with dagster dagster job execute --job sec_pipeline_job --config-file dagster_config_fixed.yaml:complete_pipeline_job'
