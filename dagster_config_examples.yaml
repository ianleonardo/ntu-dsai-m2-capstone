# Dagster Configuration Examples for SEC Data Pipeline
# These examples show how to configure different pipeline runs

# Example 1: Single Quarter Load (2023 Q1) - For Complete Job
single_quarter_job_config:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1"]
    sec_gcs_data:
      config:
        bucket_name: "dsai-m2-bucket"
        keep_local: false

# Example 2: Full Year Load (2023) - For Complete Job
full_year_job_config:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1", "q2", "q3", "q4"]
    sec_gcs_data:
      config:
        bucket_name: "dsai-m2-bucket"
        keep_local: false

# Example 3: Asset-Only Configuration (for materializing individual assets)
single_quarter_asset_config:
  year: 2023
  quarters: ["q1"]

# Example 4: Full Year Asset Configuration
full_year_asset_config:
  year: 2023
  quarters: ["q1", "q2", "q3", "q4"]

# Example 5: Test Run (Keep local files for debugging)
test_job_config:
  ops:
    sec_raw_data:
      config:
        year: 2022
        quarters: ["q1"]  # Small dataset for testing
    sec_gcs_data:
      config:
        bucket_name: "dsai-m2-bucket"
        keep_local: true  # Keep files for debugging

# Example 6: Custom Bucket
custom_bucket_job_config:
  ops:
    sec_raw_data:
      config:
        year: 2023
        quarters: ["q1"]
    sec_gcs_data:
      config:
        bucket_name: "my-custom-bucket"
        keep_local: false

# Example 7: GCS Upload Only Configuration
gcs_upload_config:
  bucket_name: "dsai-m2-bucket"
  keep_local: false

# CLI Usage Examples:
# 
# Run single quarter (complete job):
# uv run --with dagster dagster job execute --job sec_pipeline_job --config-file dagster_config_examples.yaml:single_quarter_job_config
#
# Run full year (complete job):
# uv run --with dagster dagster job execute --job sec_pipeline_job --config-file dagster_config_examples.yaml:full_year_job_config
#
# Run test (complete job):
# uv run --with dagster dagster job execute --job sec_pipeline_job --config-file dagster_config_examples.yaml:test_job_config
#
# Materialize single asset only:
# uv run --with dagster dagster asset materialize --asset sec_raw_data --config-file dagster_config_examples.yaml:single_quarter_asset_config
#
# Materialize asset with full year:
# uv run --with dagster dagster asset materialize --asset sec_raw_data --config-file dagster_config_examples.yaml:full_year_asset_config
#
# Materialize GCS upload only:
# uv run --with dagster dagster asset materialize --asset sec_gcs_data --config-file dagster_config_examples.yaml:gcs_upload_config
