# Dagster configuration for NTU DSAI Capstone Project

# Storage configuration using SQLite
storage:
  sqlite:
    base_dir: ./.dagster/storage

# Scheduler configuration (optional - for production)
scheduler:
  module: dagster.daemon.daemon
  class: DagsterDaemonScheduler

# Run launcher configuration
run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

# Telemetry (disable for privacy)
telemetry:
  enabled: false
