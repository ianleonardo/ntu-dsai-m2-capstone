apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
  namespace: dagster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-webserver
  template:
    metadata:
      labels:
        app: dagster-webserver
    spec:
      serviceAccountName: dagster-workloads
      containers:
        - name: webserver
          image: REGION-docker.pkg.dev/PROJECT_ID/REPO/capstone-dagster:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/deployment/gcp/docker-entrypoint.sh"]
          args:
            - dagster-webserver
            - -h
            - "0.0.0.0"
            - -p
            - "3000"
            - -w
            - /app/deployment/gcp/workspace.yaml
          env:
            - name: DAGSTER_HOME
              value: /opt/dagster/dagster_home
            - name: PYTHONPATH
              value: /app
          envFrom:
            - secretRef:
                name: dagster-postgres
                optional: true
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
