# Workload Identity: after creating a Google service account, bind it to this KSA, e.g.:
#   gcloud iam service-accounts add-iam-policy-binding GSA@PROJECT.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:PROJECT.svc.id.goog[dagster/dagster-workloads]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dagster-workloads
  namespace: dagster
