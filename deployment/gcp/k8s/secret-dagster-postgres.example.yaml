# Copy to secret-dagster-postgres.yaml (do not commit real passwords) and apply.
# Prefer External Secrets / Secret Manager in production.
apiVersion: v1
kind: Secret
metadata:
  name: dagster-postgres
  namespace: dagster
type: Opaque
stringData:
  DAGSTER_POSTGRES_USER: dagster
  DAGSTER_POSTGRES_PASSWORD: CHANGE_ME
  DAGSTER_POSTGRES_HOST: "127.0.0.1"
  DAGSTER_POSTGRES_DB: dagster
  DAGSTER_POSTGRES_PORT: "5432"
