version: 2

sources:
  - name: insider_transactions
    database: ntu-dsai-488112
    schema: insider_transactions
    tables:
      - name: sec_submission
        description: >-
          SEC submissions loaded from TSV. ACCESSION_NUMBER is unique per filing in SEC feeds,
          but this table may contain duplicate accessions after repeated loads (append-only ingestion).
          Staging model stg_sec_submission dedupes to one row per ACCESSION_NUMBER.
        columns:
          - name: ACCESSION_NUMBER
            description: "Filing accession (duplicates possible in raw table)"
            tests:
              - not_null

      - name: sec_reportingowner
        description: "SEC reporting owner dimension table"
        columns:
          - name: ACCESSION_NUMBER
            description: "Foreign key to submission"
          - name: RPTOWNERCIK
            description: "Reporting owner CIK"
            tests:
              - not_null

      - name: sec_nonderiv_trans
        description: "SEC non-derivative transaction dimension table"
        columns:
          - name: ACCESSION_NUMBER
            description: "Foreign key to submission"
          - name: NONDERIV_TRANS_SK
            description: "Non-derivative transaction surrogate key"
            tests:
              - not_null
          - name: TRANS_SHARES
            description: "Transaction share count (must be non-negative when numeric)"
            tests:
              - non_negative_or_null
          - name: TRANS_PRICEPERSHARE
            description: "Price per share (must be non-negative when numeric)"
            tests:
              - non_negative_or_null

      - name: sec_nonderiv_holding
        description: "SEC non-derivative holding dimension table"
        columns:
          - name: ACCESSION_NUMBER
            description: "Foreign key to submission"
          - name: NONDERIV_HOLDING_SK
            description: "Non-derivative holding surrogate key"
            tests:
              - not_null

      - name: sec_deriv_trans
        description: "SEC derivative transaction dimension table"
        columns:
          - name: ACCESSION_NUMBER
            description: "Foreign key to submission"
          - name: DERIV_TRANS_SK
            description: "Derivative transaction surrogate key"
            tests:
              - not_null
          - name: TRANS_SHARES
            description: "Transaction share count (must be non-negative when numeric)"
            tests:
              - non_negative_or_null
          - name: TRANS_PRICEPERSHARE
            description: "Price per share (must be non-negative when numeric)"
            tests:
              - non_negative_or_null

      - name: sec_deriv_holding
        description: "SEC derivative holding dimension table"
        columns:
          - name: ACCESSION_NUMBER
            description: "Foreign key to submission"
          - name: DERIV_HOLDING_SK
            description: "Derivative holding surrogate key"
            tests:
              - not_null

      # Meltano: meltano run load-sp500-companies (tap-jsonl-sp500, stream SP500_COMPANIES).
      # Target table name varies by loader; default assumes lowercase. Override with:
      #   dbt run --vars '{"sp500_companies_identifier": "YOUR_TABLE_NAME"}'
      - name: sp500_companies
        identifier: "{{ var('sp500_companies_identifier', 'sp500_companies') }}"
        description: "S&P 500 constituents (symbol, CIK, sector) for filtering insider filings"
